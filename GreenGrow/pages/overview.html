<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Overview — GreenGrow</title>
  <link rel="stylesheet" href="../assets/css/style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script src="../assets/js/sidebar.js"></script>
  <style>
    .stat-icon-wrap i svg { width: 20px; height: 20px; stroke: currentColor; display: block; }
    .stat-icon-wrap.si-green i { color: var(--green-800); }
    .stat-icon-wrap.si-blue  i { color: var(--blue); }
    .stat-icon-wrap.si-amber i { color: var(--amber); }
    .stat-icon-wrap.si-red   i { color: var(--red); }

    .pie-card { display: flex; flex-direction: column; }
    .pie-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px 0; width: 100%; height: 260px; }
    .pie-legend { margin-top: auto; padding-top: 16px; }

    .chart-period-wrap { position: relative; display: inline-block; }
    .chart-period-btn {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
      background: rgba(46,125,50,0.07); border: 1px solid rgba(46,125,50,0.2);
      border-radius: 20px; color: var(--green-800); font-size: 0.78rem; font-weight: 700;
      font-family: var(--font-body, 'DM Sans', sans-serif); cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .chart-period-btn:hover { background: rgba(46,125,50,0.13); }
    .chart-period-dropdown {
      position: absolute; top: calc(100% + 6px); right: 0; background: #fff;
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1); min-width: 140px; z-index: 999;
      overflow: hidden; display: none;
    }
    .chart-period-dropdown.open { display: block; }
    .chart-period-option {
      display: block; width: 100%; text-align: left; padding: 9px 14px;
      background: none; border: none; font-size: 0.83rem; font-weight: 500;
      font-family: var(--font-body, 'DM Sans', sans-serif); color: var(--text-sub);
      cursor: pointer; transition: background 0.12s;
    }
    .chart-period-option:hover { background: var(--green-50); }
    .chart-period-option.selected { color: var(--green-800); font-weight: 700; background: rgba(46,125,50,0.06); }

    /* ── Top Products ── */
    .top-products-list { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
    .tp-item { display: flex; align-items: center; gap: 14px; }
    .tp-rank {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; flex-shrink: 0;
    }
    .tp-rank.r1 { background: #fef9c3; color: #a16207; }
    .tp-rank.r2 { background: #f1f5f9; color: #64748b; }
    .tp-rank.r3 { background: #fef3e2; color: #c2612a; }
    .tp-rank.rn { background: rgba(46,125,50,0.08); color: var(--green-800); }
    .tp-img {
      width: 44px; height: 44px; border-radius: 10px; object-fit: cover;
      background: var(--green-50); flex-shrink: 0; border: 1px solid var(--border);
    }
    .tp-img-placeholder {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      background: var(--green-50); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .tp-info { flex: 1; min-width: 0; }
    .tp-name {
      font-size: 0.86rem; font-weight: 600; color: var(--text-main);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tp-name span.tp-seller-inline { font-weight: 400; color: var(--text-sub); }
    .tp-bar-wrap { margin-top: 6px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .tp-bar { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #4a8c5c, #81c784); transition: width 0.5s ease; }
    .tp-right { text-align: right; flex-shrink: 0; }
    .tp-orders { font-size: 0.88rem; font-weight: 700; color: var(--green-800); }
    .tp-orders-label { font-size: 0.72rem; color: var(--text-sub); }
    .tp-empty { color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 24px 0; }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topbar-left">
      <h1>Dashboard Overview</h1>
      <p>Welcome back — here's what's happening</p>
    </div>
    <div class="topbar-right">
      <div class="topbar-date" id="topbarDate">—</div>
    </div>
  </div>

  <div class="page-body">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon-wrap si-green"><i data-lucide="users"></i></div>
        <div class="stat-body"><h3 id="stat-users">—</h3><p>Total Users</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap si-blue"><i data-lucide="sprout"></i></div>
        <div class="stat-body"><h3 id="stat-sellers">—</h3><p>Active Sellers</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap si-amber"><i data-lucide="clock"></i></div>
        <div class="stat-body"><h3 id="stat-pending">—</h3><p>Pending Apps</p></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon-wrap si-red"><i data-lucide="shopping-bag"></i></div>
        <div class="stat-body"><h3 id="stat-orders">—</h3><p>Total Orders</p></div>
      </div>
    </div>

    <div class="chart-row">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Sales & Revenue Trend</span>
          <div class="chart-period-wrap" id="periodWrap">
            <button class="chart-period-btn" id="periodBtn" onclick="togglePeriodDropdown(event)">Last 7 Days ▼</button>
            <div class="chart-period-dropdown" id="periodDropdown">
              <button class="chart-period-option selected" data-value="week"  onclick="selectPeriod('week',  'Last 7 Days',  event)">Last 7 Days</button>
              <button class="chart-period-option"          data-value="month" onclick="selectPeriod('month', 'Last 30 Days', event)">Last 30 Days</button>
              <button class="chart-period-option"          data-value="year"  onclick="selectPeriod('year',  'This Year',    event)">This Year</button>
            </div>
          </div>
        </div>
        <div id="barChartWrap"><canvas id="barChart" height="130"></canvas></div>
      </div>

      <div class="card pie-card">
        <div class="card-header"><span class="card-title">User Breakdown</span></div>
        <div class="pie-wrap"><canvas id="pieChart"></canvas></div>
        <div id="pieLegend" class="pie-legend"></div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="card">
        <div class="card-header"><span class="card-title">Recent Activity</span></div>
        <div class="activity-list" id="recentList">
          <p style="color:var(--text-muted);font-size:0.85rem;">Loading activity…</p>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Top Selling Products</span></div>
        <div class="top-products-list" id="topProductsList">
          <p style="color:var(--text-muted);font-size:0.85rem;">Loading…</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
    });

    const firebaseConfig = {
      apiKey: "AIzaSyA1_zNkhNHzfmtKvJcdMGxTcM2R-7zrwUQ",
      authDomain: "greengrow-41922.firebaseapp.com",
      projectId: "greengrow-41922",
      storageBucket: "greengrow-41922.firebasestorage.app",
      messagingSenderId: "12959500274",
      appId: "1:12959500274:web:d782728c8fd90d3797cd6b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    let currentPeriod = 'week';
    let allOrderDocs  = [];
    const unsubs      = [];

    startListeners();

    function startListeners() {

      // ── Users: stats + pie ──
      unsubs.push(
        db.collection('users').onSnapshot(snap => {
          let customers = 0, sellers = 0;
          snap.forEach(doc => {
            const d = doc.data();
            if (d.role === 'admin') return;
            if (d.role === 'customer') customers++;
            if (d.role === 'seller')   sellers++;
          });
          const total = customers + sellers;
          document.getElementById('stat-users').textContent   = total;
          document.getElementById('stat-sellers').textContent = sellers;
          renderPieChart(customers, sellers);
        })
      );

      // ── Recent Activity ──
      unsubs.push(
        db.collection('users')
          .orderBy('createdAt', 'desc')
          .limit(10)
          .onSnapshot(snap => {
            const list   = document.getElementById('recentList');
            const events = [];
            snap.forEach(doc => {
              const d = doc.data();
              if (d.role === 'admin') return;
              const name = [d.firstName, d.lastName].filter(Boolean).join(' ') || 'A user';
              let rawDate;
              if (d.role === 'seller') {
                rawDate = d.roleUpdatedAt?.toDate ? d.roleUpdatedAt.toDate()
                  : d.createdAt?.toDate ? d.createdAt.toDate()
                  : d.createdAt ? new Date(d.createdAt) : null;
              } else {
                rawDate = d.createdAt?.toDate ? d.createdAt.toDate()
                  : d.createdAt ? new Date(d.createdAt) : null;
              }
              events.push({
                text: d.role === 'seller' ? `${name} became a seller` : `${name} registered as customer`,
                time: rawDate ? formatDate(rawDate) : 'recently',
                dot:  d.role === 'seller' ? 'dot-blue' : 'dot-green',
                ts:   rawDate ? rawDate.getTime() : 0
              });
            });
            if (!events.length) { list.innerHTML = '<div class="no-activity">No activity yet.</div>'; return; }
            events.sort((a, b) => b.ts - a.ts);
            list.innerHTML = events.slice(0, 5).map(e => activityRow(e.text, e.time, e.dot)).join('');
          })
      );

      // ── Pending applications ──
      unsubs.push(
        db.collection('sellerApplications')
          .where('applicationStatus', '==', 'pending')
          .onSnapshot(snap => {
            document.getElementById('stat-pending').textContent = snap.size;
          })
      );

      // ── Orders ──
      unsubs.push(
        db.collection('orders')
          .where('status', '==', 'delivered')
          .onSnapshot(snap => {
            document.getElementById('stat-orders').textContent = snap.size;
            allOrderDocs = snap.docs;
            renderBarChart(allOrderDocs, currentPeriod);
            renderTopProducts(allOrderDocs);
          })
      );
    }

    // ── Top Selling Products ──
    // 1. Tally sold qty per product name from delivered orders
    // 2. Look up matching product in `products` collection by name → get real imageUrl + sellerId
    // 3. Look up seller name from `users` by sellerId
    async function renderTopProducts(orderDocs) {
      const container = document.getElementById('topProductsList');

      // Step 1: tally from orders using item.name as key
      // also store sellerId from item if available
      const soldMap = {}; // name → { sold, sellerId }
      orderDocs.forEach(doc => {
        const items = doc.data().items || [];
        items.forEach(item => {
          const name = item.name;
          if (!name) return;
          if (!soldMap[name]) {
            soldMap[name] = { sold: 0, sellerId: item.sellerId || '' };
          }
          soldMap[name].sold += item.quantity || 1;
        });
      });

      if (!Object.keys(soldMap).length) {
        container.innerHTML = '<div class="tp-empty">No product data yet.</div>';
        return;
      }

      // Step 2: fetch all products, build name → { imageUrl, sellerId } map
      const productsSnap = await db.collection('products').get();
      const productByName = {}; // name → { imageUrl, sellerId }
      productsSnap.forEach(doc => {
        const d = doc.data();
        if (d.name) productByName[d.name] = { imageUrl: d.imageUrl || '', sellerId: d.sellerId || '' };
      });

      // Step 3: build final list, merging order data with product data
      const list = Object.entries(soldMap).map(([name, data]) => {
        const product  = productByName[name] || {};
        const sellerId = product.sellerId || data.sellerId || '';
        return { name, sold: data.sold, imageUrl: product.imageUrl || '', sellerId };
      });

      list.sort((a, b) => b.sold - a.sold);
      const top5    = list.slice(0, 5);
      const maxSold = top5[0]?.sold || 1;

      // Step 4: fetch seller names from users
      const uniqueSellerIds = [...new Set(top5.map(p => p.sellerId).filter(Boolean))];
      const sellerNames = {};
      await Promise.all(uniqueSellerIds.map(async sid => {
        try {
          const snap = await db.collection('users').doc(sid).get();
          if (snap.exists) {
            const d = snap.data();
            sellerNames[sid] = d.fullName || [d.firstName, d.lastName].filter(Boolean).join(' ') || '';
          }
        } catch (e) { /* silent */ }
      }));

      // Step 5: render
      const rankClass = i => (['r1','r2','r3','rn','rn'])[i] ?? 'rn';

      container.innerHTML = top5.map((p, i) => {
        const sellerName = sellerNames[p.sellerId] || '';
        return `
          <div class="tp-item">
            <div class="tp-rank ${rankClass(i)}">#${i + 1}</div>
            ${p.imageUrl
              ? `<img class="tp-img" src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              : ''}
            <div class="tp-img-placeholder" style="${p.imageUrl ? 'display:none' : ''}">🌱</div>
            <div class="tp-info">
              <div class="tp-name">
                ${p.name}${sellerName ? ` <span class="tp-seller-inline">— ${sellerName}</span>` : ''}
              </div>
              <div class="tp-bar-wrap">
                <div class="tp-bar" style="width:${Math.round((p.sold / maxSold) * 100)}%"></div>
              </div>
            </div>
            <div class="tp-right">
              <div class="tp-orders">${p.sold}</div>
              <div class="tp-orders-label">sold</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── Period dropdown ──
    function togglePeriodDropdown(e) {
      e.stopPropagation();
      document.getElementById('periodDropdown').classList.toggle('open');
    }

    function selectPeriod(value, label, e) {
      e.stopPropagation();
      currentPeriod = value;
      document.getElementById('periodBtn').textContent = label + ' ▼';
      document.querySelectorAll('.chart-period-option').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.value === value);
      });
      document.getElementById('periodDropdown').classList.remove('open');
      renderBarChart(allOrderDocs, currentPeriod);
    }

    document.addEventListener('click', () => {
      document.getElementById('periodDropdown').classList.remove('open');
    });

    // ── Bar chart ──
    function renderBarChart(orderDocs, period) {
      let days = [];
      const now = new Date();

      if (period === 'week') {
        for (let i = 6; i >= 0; i--) {
          const d = new Date(now); d.setDate(d.getDate() - i);
          days.push({ label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), dateStr: d.toISOString().split('T')[0], revenue: 0, orders: 0 });
        }
        const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 6); cutoff.setHours(0,0,0,0);
        orderDocs.forEach(doc => {
          const data = doc.data();
          const orderDate = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
          if (orderDate < cutoff) return;
          const day = days.find(d => d.dateStr === orderDate.toISOString().split('T')[0]);
          if (day) { day.revenue += data.total || 0; day.orders++; }
        });

      } else if (period === 'month') {
        for (let i = 29; i >= 0; i--) {
          const d = new Date(now); d.setDate(d.getDate() - i);
          days.push({ label: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }), dateStr: d.toISOString().split('T')[0], revenue: 0, orders: 0 });
        }
        const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 29); cutoff.setHours(0,0,0,0);
        orderDocs.forEach(doc => {
          const data = doc.data();
          const orderDate = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
          if (orderDate < cutoff) return;
          const day = days.find(d => d.dateStr === orderDate.toISOString().split('T')[0]);
          if (day) { day.revenue += data.total || 0; day.orders++; }
        });

      } else if (period === 'year') {
        const year = now.getFullYear();
        ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].forEach((label, m) => {
          days.push({ label, month: m, year, revenue: 0, orders: 0 });
        });
        orderDocs.forEach(doc => {
          const data = doc.data();
          const orderDate = data.createdAt?.toDate ? data.createdAt.toDate() : new Date(data.createdAt);
          if (orderDate.getFullYear() !== year) return;
          const bucket = days.find(d => d.month === orderDate.getMonth());
          if (bucket) { bucket.revenue += data.total || 0; bucket.orders++; }
        });
      }

      const labels  = days.map(d => d.label);
      const revenue = days.map(d => d.revenue);
      const orders  = days.map(d => d.orders);
      const hasData = revenue.some(v => v > 0) || orders.some(v => v > 0);
      const wrap    = document.getElementById('barChartWrap');

      if (!hasData) {
        wrap.innerHTML = `<div class="no-data"><div class="no-data-icon">📈</div><p>No sales data yet for this period.</p></div>`;
        return;
      }
      if (!document.getElementById('barChart')) {
        wrap.innerHTML = `<canvas id="barChart" height="130"></canvas>`;
      }

      const ctx = document.getElementById('barChart').getContext('2d');
      if (window.barChartInstance) window.barChartInstance.destroy();
      window.barChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Revenue (₱)', data: revenue, backgroundColor: 'rgba(90,170,110,0.85)', borderRadius: 7, borderSkipped: false, hoverBackgroundColor: '#2e7d32', yAxisID: 'yRevenue' },
            { label: 'Orders',      data: orders,  backgroundColor: 'rgba(245,158,11,0.80)', borderRadius: 7, borderSkipped: false, hoverBackgroundColor: '#d97706', yAxisID: 'yOrders'  }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: true, position: 'top', labels: { color: '#7a9b7e', font: { family: 'DM Sans', size: 11 }, boxWidth: 12, padding: 16 } },
            tooltip: { callbacks: { label: (ctx) => ctx.dataset.label === 'Revenue (₱)' ? `  ₱${ctx.parsed.y.toLocaleString()}` : `  ${ctx.parsed.y} order${ctx.parsed.y !== 1 ? 's' : ''}` } }
          },
          scales: {
            yRevenue: { beginAtZero: true, position: 'left', grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#7a9b7e', font: { family: 'DM Sans', size: 11 }, callback: v => '₱' + v.toLocaleString() } },
            yOrders:  { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#f59e0b', font: { family: 'DM Sans', size: 11 }, stepSize: 1, precision: 0 } },
            x: { grid: { display: false }, ticks: { color: '#7a9b7e', font: { family: 'DM Sans', size: 11 }, maxTicksLimit: period === 'month' ? 10 : undefined } }
          }
        }
      });
    }

    function renderPieChart(customers, sellers) {
      const total = customers + sellers;
      const ctx   = document.getElementById('pieChart').getContext('2d');
      if (window.pieChartInstance) window.pieChartInstance.destroy();
      window.pieChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: ['Customers', 'Sellers'],
          datasets: [{ data: [customers, sellers], backgroundColor: ['#5aaa6e', '#1b5e20'], borderColor: ['#fff','#fff'], borderWidth: 3, hoverOffset: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: true, aspectRatio: 1, plugins: { legend: { display: false }, tooltip: { enabled: true } } }
      });
      const cPct = total > 0 ? Math.round((customers / total) * 100) : 0;
      const sPct = total > 0 ? Math.round((sellers   / total) * 100) : 0;
      document.getElementById('pieLegend').innerHTML = `
        <div class="legend-row">
          <div class="legend-left"><div class="legend-dot" style="background:#5aaa6e"></div>Customers (${customers})</div>
          <span class="legend-pct">${cPct}%</span>
        </div>
        <div class="legend-row">
          <div class="legend-left"><div class="legend-dot" style="background:#1b5e20"></div>Sellers (${sellers})</div>
          <span class="legend-pct">${sPct}%</span>
        </div>`;
    }

    function activityRow(text, time, dotClass) {
      return `
        <div class="activity-item">
          <div class="act-dot ${dotClass}"></div>
          <div class="act-body">
            <div class="act-text">${text}</div>
            <div class="act-time">${time}</div>
          </div>
        </div>`;
    }

    function formatDate(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    lucide.createIcons();
  </script>
</body>
</html>
