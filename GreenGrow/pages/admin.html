<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GreenGrow Admin</title>
  <link rel="stylesheet" href="../assets/css/style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
  <div id="fadeOverlay"></div>

  <div class="shell">
    <aside class="sidebar">

      <!-- Brand -->
      <div class="sidebar-brand">
        <div class="brand-leaf"><i data-lucide="leaf"></i></div>
        <div>
          <div class="brand-text">GreenGrow</div>
          <div class="brand-tag">Admin Panel</div>
        </div>
      </div>

      <!-- Nav -->
      <nav class="side-nav">
        <div class="nav-section-label">Main</div>
        <a class="nav-link" data-page="overview.html" href="#">
          <i data-lucide="layout-dashboard" class="nav-icon"></i> Dashboard
        </a>
        <a class="nav-link" data-page="user-management.html" href="#">
          <i data-lucide="users" class="nav-icon"></i> User Management
        </a>
        <a class="nav-link" data-page="listings.html" href="#">
          <i data-lucide="sprout" class="nav-icon"></i> Listing Management
        </a>
        <div class="nav-section-label">Reports</div>
        <a class="nav-link" data-page="analytics.html" href="#">
          <i data-lucide="bar-chart-2" class="nav-icon"></i> Analytics & Reports
        </a>
      </nav>

      <!-- Logout -->
      <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">
          <i data-lucide="log-out" class="nav-icon"></i> Log out
        </button>
      </div>

    </aside>

    <iframe id="pageFrame"></iframe>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA1_zNkhNHzfmtKvJcdMGxTcM2R-7zrwUQ",
      authDomain: "greengrow-41922.firebaseapp.com",
      projectId: "greengrow-41922",
      storageBucket: "greengrow-41922.firebasestorage.app",
      messagingSenderId: "12959500274",
      appId: "1:12959500274:web:d782728c8fd90d3797cd6b"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    const frame    = document.getElementById('pageFrame');
    const overlay  = document.getElementById('fadeOverlay');
    const navLinks = document.querySelectorAll('.nav-link[data-page]');

    const STORAGE_KEY = 'gg_admin_page';
    const lastPage = sessionStorage.getItem(STORAGE_KEY) || 'overview.html';
    frame.src = lastPage;
    setActive(lastPage);

    auth.onAuthStateChanged(async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (!userDoc.exists) { await auth.signOut(); window.location.href = 'index.html'; return; }
        const userData = userDoc.data();
        if (userData.role !== 'admin') { await auth.signOut(); window.location.href = 'index.html'; return; }
        // admin info strip removed from sidebar
      } catch (err) {
        console.error('Auth error:', err);
        window.location.href = 'index.html';
      }
    });

    function navigateTo(page) {
      if (frame.src.endsWith(page)) return;
      overlay.classList.add('fading');
      setTimeout(() => {
        frame.src = page;
        setActive(page);
        sessionStorage.setItem(STORAGE_KEY, page);
        frame.onload = () => overlay.classList.remove('fading');
      }, 150);
    }

    function setActive(page) {
      navLinks.forEach(link => {
        link.classList.toggle('active', link.dataset.page === page);
      });
    }

    navLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        navigateTo(link.dataset.page);
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      sessionStorage.removeItem(STORAGE_KEY);
      await auth.signOut();
      window.location.href = 'index.html';
    });

    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
